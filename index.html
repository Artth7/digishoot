<!DOCTYPE html>
<html>
<head>
<title>Device Verification</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f5f5f5;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
max-width:420px;
}

h2{
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:25px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 28px;
font-size:15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1e4ed8;
}
</style>
</head>

<body>

<div class="card">

<h2>Device Verification</h2>

<p>
We detected a login attempt from a new device.  
Please verify your device to continue.
</p>

<button onclick="verify()">Verify Device</button>

</div>

<script>
function verify(){
window.location.href="selfie-prank.html"
}
</script>

</body>
</html>
